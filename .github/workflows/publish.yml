name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for OIDC Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches release tag
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          RELEASE_TAG="${{ github.ref_name }}"
          if [ "$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "❌ package.json version ($PACKAGE_VERSION) does not match release tag ($RELEASE_TAG)"
            exit 1
          fi
          echo "✅ Version match confirmed: $RELEASE_TAG"

      - name: Publish to npm (Trusted Publishing — no token required)
        run: npm publish --access public --provenance
